<!DOCTYPE html>
<html>
<head>
    <title>Zubia Perfume</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(to right, #ffe6f0, #fff2e6);
            text-align: center;
        }

        header {
            background: black;
            color: white;
            padding: 20px;
            font-size: 28px;
        }

        h1 {
            margin-top: 40px;
            color: #b30059;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        .box {
            background: white;
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        .btn {
            background: #b30059;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            margin-top: 10px;
        }

        .btn:hover {
            background: #800040;
        }
    </style>
</head>

<body>

    <header>
        Zubia Perfume 💖
    </header>

    <h1>Welcome to Luxury Perfume World</h1>

    <div class="box">
        <h2>Our Collection</h2>
        <p>Best luxury perfumes for men & women</p>
        <a href="#" class="btn">Shop Now</a>
    </div>

</body>
</html>
